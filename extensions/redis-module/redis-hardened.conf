# redis-2fapi hardened configuration
# All dangerous commands disabled. Red team pass 4 compliance.

# === Network ===
bind 127.0.0.1 -::1
protected-mode yes

# === TLS (uncomment for production) ===
# tls-port 6380
# port 0
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

# === Dangerous commands — DISABLED ===
# Replication exfiltration (RD-082)
rename-command SLAVEOF ""
rename-command REPLICAOF ""

# Debug / introspection (RD-007)
rename-command DEBUG ""
rename-command OBJECT ""

# Data destruction (RD-090)
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# Key exfiltration (RD-092/E63)
rename-command MIGRATE ""
rename-command DUMP ""
rename-command RESTORE ""

# Key manipulation bypass (E60/E61)
rename-command RENAME ""
rename-command RENAMENX ""
rename-command COPY ""

# Command sniffing (RD-051)
rename-command MONITOR ""

# Keyspace scanning (I103/F75)
rename-command KEYS ""
rename-command RANDOMKEY ""

# TTL manipulation (E64)
rename-command PERSIST ""

# Database switching (E58/E59)
rename-command SWAPDB ""

# Lua scripting bypass (I104)
rename-command EVAL ""
rename-command EVALSHA ""
rename-command SCRIPT ""

# Module manipulation (I105)
rename-command MODULE ""

# Sort with GET pattern (I108)
rename-command SORT ""

# ACL manipulation (I106) — rename to admin-only alias
rename-command ACL "TWOFAPI_ADMIN_ACL"

# Config manipulation (I101) — rename to admin-only alias
rename-command CONFIG "TWOFAPI_ADMIN_CONFIG"

# Keyspace notification subscription (A-003)
rename-command SUBSCRIBE ""
rename-command PSUBSCRIBE ""

# Server shutdown (A-004)
rename-command SHUTDOWN ""

# Database switching (A-004)
rename-command SELECT ""

# CLIENT manipulation — keep but restrict via ACL
# rename-command CLIENT ""

# === Memory ===
maxmemory 256mb
maxmemory-policy noeviction

# === Persistence (disabled by default — no secrets on disk) ===
save ""
appendonly no

# === Slowlog ===
slowlog-log-slower-than 100000
slowlog-max-len 32
